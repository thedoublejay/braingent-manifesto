# Deploy the Starlight site to Cloudflare Pages.
#
# This mirrors the Gather Step website workflow. It is stored under `website/`
# to keep this scaffold scoped; GitHub Actions only runs workflows from the
# repository-root `.github/workflows/` directory.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  - Cloudflare API token with Pages:Edit permission
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare account ID
#
# Optional repo variable:
#   CLOUDFLARE_PAGES_PROJECT - Pages project name. Defaults to "braingent".

name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  pull_request:
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Compute deploy branch
        id: branch
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          raw="${HEAD_REF:-$REF_NAME}"
          safe="$(printf '%s' "$raw" | tr -c 'A-Za-z0-9._/-' '-' | cut -c1-255)"
          echo "name=${safe}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy website/dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'braingent' }}
            --branch=${{ steps.branch.outputs.name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
